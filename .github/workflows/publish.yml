name: Build and Push to Docker Hub

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build temp image and extract SVN version
        id: version
        run: |
          docker buildx build --load --platform linux/amd64 -t svn-temp:local .
          SVN_VERSION=$(docker run --rm svn-temp:local --version --quiet 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [ -z "$SVN_VERSION" ]; then
            echo "Failed to extract SVN version"
            exit 1
          fi
          echo "svn_version=$SVN_VERSION" >> $GITHUB_OUTPUT
          MINOR_VERSION=$(echo "$SVN_VERSION" | cut -d. -f1,2)
          echo "minor_version=$MINOR_VERSION" >> $GITHUB_OUTPUT

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/svn-cli:${{ steps.version.outputs.svn_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/svn-cli:${{ steps.version.outputs.minor_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/svn-cli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/svn-cli
          readme-filepath: ./README.md
